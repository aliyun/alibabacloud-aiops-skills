# StrongSwan IPsec VPN Service Override
# /etc/systemd/system/strongswan.service.d/override.conf
#
# This override ensures StrongSwan starts after network is fully online
# and automatically restarts on failure

[Unit]
# Start after network is fully online
After=network-online.target
Wants=network-online.target

[Service]
# Always restart on failure
Restart=always
RestartSec=10

# Load required kernel module before starting
ExecStartPre=-/sbin/modprobe af_key

# Increase file descriptor limit for high-traffic scenarios
LimitNOFILE=65536

# Optional: Enable core dumps for debugging
# LimitCORE=infinity

[Install]
WantedBy=multi-user.target
