# strongswan.conf - StrongSwan daemon configuration for VICI/swanctl mode
#
# This configuration enables the VICI interface for swanctl management
# and loads all connections from /etc/swanctl/swanctl.conf

charon {
    # Load plugins modularly
    load_modular = yes

    # Plugin configuration
    plugins {
        include strongswan.d/charon/*.conf
    }

    # Load required plugins for VICI and IPsec
    # vici - VICI interface for swanctl
    # stroke - Compatibility (optional)
    # kernel-netlink - Kernel IPsec interface
    # socket-default - Default socket implementation
    # updown - Updown scripts for routing
    load = curl aes des sha1 sha2 md5 pem pkcs1 gmp random nonce hmac stroke kernel-netlink socket-default updown vici

    # Install routes automatically
    install_routes = yes

    # Disable virtual IP installation (not needed for site-to-site)
    install_virtual_ip = no
}

# Include swanctl configuration (connections and secrets)
include /etc/swanctl/swanctl.conf

# Include additional configuration files
include strongswan.d/*.conf
