# swanctl.conf - StrongSwan VICI configuration for Alibaba Cloud IPsec VPN
# For dual-tunnel mode with both tunnels active (priority-based routing)
#
# Installation:
#   1. Install strongswan-swanctl package
#   2. Copy this file to /etc/swanctl/swanctl.conf
#   3. Update /etc/strongswan.conf to include: include /etc/swanctl/swanctl.conf
#   4. Start charon: /usr/lib/ipsec/charon
#   5. Load config: swanctl --load-all
#
# Tunnel Parameters (replace with your actual values):
#   VPN Gateway IP 1 (Master): 39.106.36.158
#   VPN Gateway IP 2 (Slave):  39.105.20.65
#   Server Public IP:          203.0.113.10
#   PSK:                       example-PSK
#   Local Subnet (Server):     10.0.0.0/24
#   Remote Subnet (VPC):       172.16.0.0/16

connections {

   # ==========================================================================
   # Master Tunnel - Primary VPN Gateway
   # ==========================================================================
   aliyun-vpn-master {
      version = 2                      # IKEv2
      local_addrs  = %defaultroute     # Auto-detect local address
      remote_addrs = 39.106.36.158     # Primary VPN Gateway IP

      # DPD Configuration
      dpd_delay = 30s
      dpd_timeout = 120s

      # IKE Rekey
      rekey_time = 85500s
      over_time = 1800s

      # IKE Proposals (Phase 1)
      proposals = aes256-sha256-modp2048

      # NAT Traversal
      encap = yes

      # Local Authentication
      local {
         auth = psk
         id = 203.0.113.10              # Server Public IP
      }

      # Remote Authentication
      remote {
         auth = psk
         id = 39.106.36.158             # VPN Gateway IP 1
      }

      # CHILD SA Configuration (Phase 2)
      children {
         aliyun-vpn-master-child {
            local_ts  = 10.0.0.0/24      # Local subnet
            remote_ts = 172.16.0.0/16    # VPC subnet
            mode = tunnel

            rekey_time = 85500s
            life_time = 86400s

            dpd_action = restart
            start_action = start
            close_action = start

            esp_proposals = aes256-sha256-modp2048

            # Priority: Lower value = Higher priority
            # Master tunnel has priority 100 (higher priority)
            priority = 100
         }
      }
   }

   # ==========================================================================
   # Slave Tunnel - Backup VPN Gateway
   # ==========================================================================
   aliyun-vpn-slave {
      version = 2
      local_addrs  = %defaultroute
      remote_addrs = 39.105.20.65       # Backup VPN Gateway IP

      dpd_delay = 30s
      dpd_timeout = 120s

      rekey_time = 85500s
      over_time = 1800s

      proposals = aes256-sha256-modp2048

      encap = yes

      local {
         auth = psk
         id = 203.0.113.10
      }

      remote {
         auth = psk
         id = 39.105.20.65
      }

      children {
         aliyun-vpn-slave-child {
            local_ts  = 10.0.0.0/24
            remote_ts = 172.16.0.0/16
            mode = tunnel

            rekey_time = 85500s
            life_time = 86400s

            dpd_action = restart
            start_action = start
            close_action = start

            esp_proposals = aes256-sha256-modp2048

            # Slave tunnel has priority 200 (lower priority)
            # Both tunnels UP, but traffic prefers master
            priority = 200
         }
      }
   }

}

# ==========================================================================
# Pre-Shared Keys (PSK)
# ==========================================================================
secrets {

   # Master Tunnel PSK
   ike-aliyun-master {
      id = 39.106.36.158
      secret = "example-PSK"
   }

   # Slave Tunnel PSK
   ike-aliyun-slave {
      id = 39.105.20.65
      secret = "example-PSK"
   }

}
