faq:
  - question: 为什么写入日志后查询不到日志？
    answer: 
    - 检查已设置的分词符是否符合要求。
    - 索引配置只对新增日志生效，如果要查询和分析历史数据，请使用重建索引功能。
    - 确认是否已经开启索引配置。

  - question: SQL的select * 为什么不返回所有字段？
    answer:
    - SQL的select * 返回的结果是所有索引字段的内容，而不是日志中所有字段。如果要返回所有字段需要用索引查询或者用扫描查询进行SCAN
