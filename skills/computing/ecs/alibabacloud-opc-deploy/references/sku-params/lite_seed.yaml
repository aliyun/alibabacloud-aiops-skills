# ═══════════════════════════════════════
# Notes (developer documentation)
# ═══════════════════════════════════════
notes:
  - "SWAS PlanId hardcoded swas.s.c2m4s50b1.linux (Beijing general-purpose); SWAS has no public ListPlans API"
  - "The OpenClaw image ID is decided by the SKILL.md 'OpenClaw dynamic image lookup' flow (the old 74dab916b0ca4ca29e67988f03a1adc3 = OpenClaw-2026.5.19 has expired; hardcoding it again is forbidden)"
  - "ECS c9i is compute-type (CPU:memory = 1:2), the Lite default family"
  - "RDS SecurityIPList only lists the ECS intranet IP (no public access)"
  - "The OSS bucket name is globally unique and needs a random suffix; the Endpoint/intranet Endpoint stay in the yaml for the program, not shown in the user-facing step report"
  - "RDS DBInstanceStorageType=general_essd is an API field; user-facing wording is unified as a data-storage space, not exposing ESSD/PL technical terms"
  - "ECS SystemDisk.Category=cloud_essd / cloud_essd_entry etc. are also kept only in yaml fields; user-facing wording is unified as a system disk with an analogy"
  - "RDS password should be auto-generated (16 chars, upper+lower+digits+special)"
  - "ECS pay-by-traffic (InternetChargeType=PayByTraffic), CDT grants 220GB free traffic per month; user-facing wording uses the mobile-data-plan analogy"
  - "⚠️ PeriodUnit=Month (correct monthly billing form)"
  - "⚠️ ImageId is centrally resolved by SKILL.md Phase 0.4 and written to state; this yaml only consumes ${state.resources.ecs.image_id} (iron-rule #27)"

