# OPC Cloud Deploy - lite_seed SKU params
# Lite (OpenClaw) + ECS c9i 2C4G + RDS 1C2G + OSS 40GB + Token Plan + PDS + ESA
# Use case: just got seed users, a few to a dozen concurrent

sku: lite_seed
version: v1.0.0
region_default: cn-beijing
monthly_price: "¥596.54/月 + OSS ¥9/年"
disclaimer: "💡 价格供参考，实际以最终下单为准。"

