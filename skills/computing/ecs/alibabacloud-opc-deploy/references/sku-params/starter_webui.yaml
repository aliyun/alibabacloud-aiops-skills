# ═══════════════════════════════════════
# Notes (developer documentation)
# ═══════════════════════════════════════
notes:
  - "ecs.e-c1m1.large is the economy-e series, 2C2G, suited to lightweight workloads"
  - "InternetMaxBandwidthOut=3 means 3 Mbps fixed bandwidth (the default path, when the ¥99/yr promo is hit); the fallback path switches to 100 Mbps pay-by-traffic — see user_summary_fallback"
  - "cloud_essd_entry = ESSD Entry-tier cloud disk (API field; consistently described to the user as a 40GiB system disk)"
  - "⚠️ ImageId is centrally resolved by SKILL.md Phase 0.4 and written to state; this yaml only consumes ${state.resources.ecs.image_id} (iron-rule #27)"
  - "⚠️ Correct annual billing params: PeriodUnit=Month + Period=12 (PeriodUnit=Year errors with InvalidPeriodType)"
  - "⚠️ The price-inquiry API (DescribePrice) uses PriceUnit=Year + Period=1 (note the different param name! PriceUnit != PeriodUnit)"
  - "The ECS economy-e ¥99/yr promo price is available when created via the API"
  - "Starter needs no SWAS/RDS/OSS — just one ECS (since v4, starter no longer includes the OpenClaw path; OpenClaw is only used by lite/pro)"
  - "The desktop AI tool (QoderWork CN Pro, etc.) is downloaded/installed by the user; it is not a cloud resource"
  - "ESA Free is provisioned via the PurchaseRatePlan API (PlanName=entranceplan, ¥0); on failure, fall back to manual"

