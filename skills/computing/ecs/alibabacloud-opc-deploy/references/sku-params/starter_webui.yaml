# OPC Cloud Deploy - starter_webui SKU params
# Simplest SKU: one ECS economy-e 2C2G + ESA Free
# Use case: portfolio / showcase / personal homepage; the product does not call AI

sku: starter_webui
variant: default                                 # internal marker: ECS primary path (used when Phase 1.2.5 inquiry hits ¥99/yr)
version: v1.0.0
region_default: cn-beijing
monthly_price: "约 ¥8.25/月（¥99/年活动摊算）"
annual_promo: "¥99/年（ECS 经济型e 长期优惠，命中 RuleId=20906709，续费同价）"
disclaimer: "💡 价格供参考，实际以最终下单为准。ECS ¥99/年活动以下单时活动可用性为准；询价未命中时由 deploy 切换到 fallback_ecs_config（按流量计费 100M 峰值，约 ¥284.99/年北京），并自动配 CloudMonitor 出流量告警。"

# ───────────────────────────────────────
# Fallback config used when the price inquiry misses
# ───────────────────────────────────────
fallback_ecs_config:
  trigger: "enabled when DescribePrice misses RuleId=20906709 (¥99/yr)"
  instance_type: "ecs.e-c1m1.large"
  internet_charge_type: "PayByTraffic"
  internet_max_bandwidth_out: 100               # 100 Mbps peak, billed by actual traffic
  expected_annual_cost: "approx ¥284.99/yr (measured in Beijing cn-beijing)"
  required_addons:
    - "Phase 4 must create a CloudMonitor outbound-traffic alarm (default threshold: 50GB/day)"
  user_consent_required: true                   # the user must explicitly confirm before continuing

