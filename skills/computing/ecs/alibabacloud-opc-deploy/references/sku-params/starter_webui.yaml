# ═══════════════════════════════════════
# Create steps (Phase 3 executes them in order)
# ═══════════════════════════════════════
steps:

  # ─── Step 1: create the ECS instance ───
  - name: "创建你的小店面（服务器）"
    type: api
    product: ecs
    action: RunInstances
    params:
      RegionId: "${region}"
      ZoneId: "${zone_id}"
      InstanceType: "ecs.e-c1m1.large"
      ImageId: "${state.resources.ecs.image_id}"
      # ⚠️ ImageId is centrally resolved by SKILL.md Phase 0.4 and written to state; this yaml only consumes the state variable.
      # Do NOT reuse the old variable name / hardcode a literal; scale-out/rebuild reuse the same image (iron-rule #27).
      SecurityGroupId: "${security_group_id}"
      VSwitchId: "${vswitch_id}"
      InstanceName: "OPC-Starter-WebUI"
      HostName: "opc-starter"
      InstanceChargeType: "PrePaid"
      # ⚠️ Correct annual billing: PeriodUnit=Month + Period=12 (NOT PeriodUnit=Year)
      Period: 12
      PeriodUnit: "Month"
      AutoRenew: false  # auto-renew off by default
      # Storage
      SystemDisk.Category: "cloud_essd_entry"
      SystemDisk.Size: 40
      # Network
      InternetChargeType: "PayByBandwidth"
      InternetMaxBandwidthOut: 3
      # Amount
      Amount: 1
      # Tags
      Tag.1.Key: "opc:managed"
      Tag.1.Value: "true"
      Tag.2.Key: "opc:sku"
      Tag.2.Value: "starter_webui"
    wait_until:
      product: ecs
      action: DescribeInstanceStatus
      params:
        RegionId: "${region}"
        InstanceId.1: "${ecs_instance_id}"
      condition: "InstanceStatuses.InstanceStatus[0].Status == Running"
      timeout_seconds: 300
      poll_interval_seconds: 10
    output_vars:
      ecs_instance_id: "InstanceIdSets.InstanceIdSet[0]"
    post_actions:
      # ECS RunInstances --Tag does not persist; must call TagResources after creation to backfill the tag
      - product: ecs
        action: TagResources
        params:
          RegionId: "${region}"
          ResourceType: "instance"
          ResourceId.1: "${ecs_instance_id}"
          Tag.1.Key: "opc:managed"
          Tag.1.Value: "true"
          Tag.2.Key: "opc:sku"
          Tag.2.Value: "starter_webui"
      # Query instance details to obtain the public IP
      - product: ecs
        action: DescribeInstances
        params:
          RegionId: "${region}"
          InstanceIds: '["${ecs_instance_id}"]'
        output_vars:
          ecs_public_ip: "Instances.Instance[0].PublicIpAddress.IpAddress[0]"
          ecs_private_ip: "Instances.Instance[0].VpcAttributes.PrivateIpAddress.IpAddress[0]"
    report: |
      ✓ 你的小店面已开门！
        公网 IP：${ecs_public_ip}
        系统：Alibaba Cloud Linux（最新版）
        配置：2核2G · 40GiB 系统盘（类似你电脑的系统盘）· 3Mbps 公网带宽
        费用：¥99/年（已按年付，**自动续费已默认关闭**，到期前 7 天会收到短信/站内信提醒）
        状态：运行中

  # ─── Step 2: ESA Free (API auto-provision) ───
  - name: "开通全球加速（ESA 免费版）"
    type: api
    product: esa
    action: PurchaseRatePlan
    # ESA product version 2024-09-10
    # CLI: aliyun esa purchase-rate-plan --PlanName entranceplan --ChargeType PREPAY --AutoPay true --Period 1 [--force by version-guard]
    params:
      PlanName: "entranceplan"
      ChargeType: "PREPAY"
      AutoPay: true
      AutoRenew: false  # aligned with the other yamls
      Period: 1
    output_vars:
      esa_instance_id: "InstanceId"
    report: |
      ✓ 全球加速已激活（ESA 免费版，¥0）
        实例 ID：${esa_instance_id}
        控制台：https://esa.console.aliyun.com/
        💡 有域名后来控制台配置站点加速
    fallback_manual: |
      如果 API 失败，降级手动：
      👉 https://esa.console.aliyun.com/commonBuy
      选最左边「免费版」→ 确认开通。

