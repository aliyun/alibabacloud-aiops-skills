# OPC Cloud Deploy - lite_traction SKU params
# Same resources as lite_seed, ECS upgraded to 4C8G + RDS upgraded to 4C8G
# Use case: one-to-two hundred concurrent, on the verge of Pro, both compute and DB under pressure

sku: lite_traction
version: v1.0.0
region_default: cn-beijing
monthly_price: "¥1131.45/月 + OSS ¥9/年"
disclaimer: "💡 价格供参考，实际以最终下单为准。"

# ═══════════════════════════════════════
# Differences from lite_seed
# ═══════════════════════════════════════
# Difference 1: ECS c9i from 2C4G → 4C8G (+¥186/month)
# Difference 2: RDS from 1C2G → 4C8G (+¥349/month)
# Reason: with one-to-two hundred concurrent users, the compute layer and storage layer are pressured at the same time

