  - name: "ESA WAF 三条基础防护规则（引导手动配置，需先有备案域名）"
    type: manual
    optional: true
    instructions: |
      ESA 标准版自带 WAF 引擎，但默认规则较宽松。建议手动加三条基础规则：
      👉 https://esa.console.aliyun.com/ → 你的站点 → 安全防护 → WAF 自定义规则
      
      ① **SQL 注入拦截**：规则类型 SQL_INJECTION，动作 Block，灵敏度 Medium
      ② **XSS 拦截**：规则类型 XSS，动作 Block，灵敏度 Medium
      ③ **暴力登录限频**：URL 包含 /login，5 分钟内同 IP > 10 次 → Block 10 分钟
      
