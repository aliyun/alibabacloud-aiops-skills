# OPC Cloud Deploy - pro_burst SKU params
# On top of pro_steady: ECS upgraded to 8C16G ×2 (elastic to 3) + ESS auto-scaling
# Use case: bursty traffic (livestream/campaign/flash-sale), normal usually, spikes to 500-1000 concurrent

sku: pro_burst
version: v1.0.0
region_default: cn-beijing
monthly_price: "¥3258.19/月（min=2）/ ¥4021.83（弹出 1 台）+ ALB LCU 按量≈¥30-50"
disclaimer: "💡 价格供参考，实际以最终下单为准。ESA medium ¥99/月命中限时优惠 RuleDescId=20980267（限购5个，以下单时活动可用性为准）。"

# ═══════════════════════════════════════
# Differences from pro_steady
# ═══════════════════════════════════════
# Difference 1: ECS from c9i 4C8G ×2 → 8C16G ×2 (+¥744/month)
# Difference 2: added ESS auto-scaling (min=2, max=3), auto-launches a 3rd instance on burst
# Difference 3: the ESS service itself is free; you only pay for the launched ECS (temporary pay-as-you-go ≈¥763.64/month level, billed hourly)
# Reason: traffic spikes need a stronger single node + elastic scale-out capability

package_contents: |
  这个套餐包含（弹性高可用架构）：
  ✦ AI 助理的家（轻量应用服务器 + OpenClaw）
  ✦ 业务店面 × 2-3 台（ECS 8核16G，平时2台，突发自动拉第3台）
  ✦ 弹性伸缩（ESS）—— 流量尖刺时自动加机器，回落后自动缩
  ✦ 分流引导员（ALB 负载均衡）
  ✦ 客户档案柜（RDS 高可用版 4核8G）
  ✦ 大仓库（OSS 500GB）
  ✦ 全球加速 + 安全防护（ESA 标准版）
  ✦ AI 能力（Token Plan 标准版）
  ✦ 存储空间（阿里云盘 500GB）

