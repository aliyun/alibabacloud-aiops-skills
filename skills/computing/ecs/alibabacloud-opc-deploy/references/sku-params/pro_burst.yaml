notes:
  - "Differences from pro_steady: ECS 4C8G→8C16G (+¥744) + ESS auto-scaling (free service + on-demand ECS fee)"
  - "c9i.2xlarge = 8C16G compute-type"
  - "ESS min=2 max=3: at most 3 instances, to avoid uncontrolled cost blow-up"
  - "ESS-launched ECS is pay-as-you-go (≈¥1.06/hour), not monthly"
  - "RDS allowlist switched to security-group authorization (ModifySecurityGroupConfiguration); ESS-launched ECS gain connect rights by inheriting the security group, no need to open the 10.0.0.0/24 range"
  - "ESS cooldown 300 seconds = no repeat scaling within 5 minutes, prevents flapping"
  - "⚠️ The ImageId in the ESS scaling configuration must match the main ECS, otherwise launched instances have a different environment"
  - "⚠️ In real deployment, configure the ESS UserData script so launched ECS auto-pull the code and start the service"

