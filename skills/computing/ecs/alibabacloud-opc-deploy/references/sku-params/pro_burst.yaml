# ═══════════════════════════════════════
# Create steps
# ═══════════════════════════════════════
steps:

  # ─── Step 1: SWAS + OpenClaw ───
  - name: "创建 AI 助理的家（轻量应用服务器 + OpenClaw）"
    type: api
    product: swas-open
    action: CreateInstances
    params:
      RegionId: "${region}"
      ImageId: "${openclaw_image_id}"  # dynamic lookup
      PlanId: "swas.s.c2m4s50b1.linux"
      # hardcoded (SWAS has no public ListPlans API)
      Period: 1
      AutoRenew: false  # auto-renew off by default
    wait_until:
      product: swas-open
      action: ListInstances
      params:
        RegionId: "${region}"
      condition: "Instances[last].Status == Running"
      timeout_seconds: 300
      poll_interval_seconds: 15
    output_vars:
      swas_instance_id: "InstanceIds[0]"
    post_actions:
      - product: swas-open
        action: ListInstances
        params:
          RegionId: "${region}"
          InstanceIds: '["${swas_instance_id}"]'
        output_vars:
          swas_public_ip: "Instances[0].PublicIpAddress"
    report: |
      ✓ AI 助理的家已就绪！
        公网 IP：${swas_public_ip}
        登录入口：去轻量应用服务器控制台 https://swas.console.aliyun.com/
                 → 找到「OPC-Pro-Burst-OpenClaw」→ 点「应用详情」→「登录 Web UI」按钮（用控制台显示的 Token 登录）
        配置：2核4G · 50GiB 系统盘（类似你电脑的系统盘）· 200Mbps 峰值带宽
        网络：套餐内含流量，不另收费（类似手机流量套餐）
      💡 不直接用 IP+8080，更安全

  # ─── Step 2: ECS ×2 (8C16G) ───
  - name: "创建业务店面（ECS 8核16G × 2 台）"
    type: api
    product: ecs
    action: RunInstances
    params:
      RegionId: "${region}"
      ZoneId: "${zone_id}"
      InstanceType: "ecs.c9i.2xlarge"
      # c9i.2xlarge = 8C16G
      ImageId: "${state.resources.ecs.image_id}"
      SecurityGroupId: "${security_group_id}"
      VSwitchId: "${vswitch_id}"
      InstanceName: "OPC-Pro-Burst-ECS"
      HostName: "opc-pro-burst"
      InstanceChargeType: "PrePaid"
      Period: 1
      PeriodUnit: "Month"
      AutoRenew: false  # auto-renew off by default
      SystemDisk.Category: "cloud_essd"
      SystemDisk.Size: 40
      SystemDisk.PerformanceLevel: "PL0"
      InternetChargeType: "PayByTraffic"
      InternetMaxBandwidthOut: 100
      Amount: 2
      Tag.1.Key: "opc:managed"
      Tag.1.Value: "true"
      Tag.2.Key: "opc:sku"
      Tag.2.Value: "pro_burst"
    wait_until:
      product: ecs
      action: DescribeInstanceStatus
      params:
        RegionId: "${region}"
        InstanceId.1: "${ecs_instance_id_1}"
        InstanceId.2: "${ecs_instance_id_2}"
      condition: "all Status == Running"
      timeout_seconds: 300
      poll_interval_seconds: 10
    output_vars:
      ecs_instance_id_1: "InstanceIdSets.InstanceIdSet[0]"
      ecs_instance_id_2: "InstanceIdSets.InstanceIdSet[1]"
    post_actions:
      # ECS RunInstances --Tag does not persist; must call TagResources after creation to backfill the tags
      - product: ecs
        action: TagResources
        params:
          RegionId: "${region}"
          ResourceType: "instance"
          ResourceId.1: "${ecs_instance_id_1}"
          ResourceId.2: "${ecs_instance_id_2}"
          Tag.1.Key: "opc:managed"
          Tag.1.Value: "true"
          Tag.2.Key: "opc:sku"
          Tag.2.Value: "pro_burst"
      - product: ecs
        action: DescribeInstances
        params:
          RegionId: "${region}"
          InstanceIds: '["${ecs_instance_id_1}","${ecs_instance_id_2}"]'
        output_vars:
          ecs_public_ip_1: "Instances.Instance[0].PublicIpAddress.IpAddress[0]"
          ecs_public_ip_2: "Instances.Instance[1].PublicIpAddress.IpAddress[0]"
          ecs_private_ip_1: "Instances.Instance[0].VpcAttributes.PrivateIpAddress.IpAddress[0]"
          ecs_private_ip_2: "Instances.Instance[1].VpcAttributes.PrivateIpAddress.IpAddress[0]"
    report: |
      ✓ 双机店面已就绪！
        ECS-1：${ecs_public_ip_1}（8核16G）
        ECS-2：${ecs_public_ip_2}（8核16G）
        配置：8核16G × 2 台 · 40GiB 系统盘（类似你电脑的系统盘）· 100Mbps 峰值带宽
        网络：流量按使用量计费，每月送 220GB 免费额度（类似手机流量套餐——超出免费额度才计费）

  # ─── Step 2.5: request an SSL certificate ───
  # Same logic as pro_steady: if the user has a cert, fill in the ID / if not, the engine applies for one / if no domain, skip and degrade to HTTP.
  - name: "申请 SSL 证书（HTTPS 必备）"
    type: manual
    optional: true
    instructions: |
      🔐 接下来要给 ALB 配 HTTPS（让用户敲 https://你的域名 能加密访问）。
      这一步需要一个【已备案域名 + 已申请的免费 DV 证书】。

      请告诉我你属于哪种情况：
        A. 我已经在「SSL 证书服务」里申请过免费 DV 证书 → 把证书 ID 给我（控制台：https://yundun.console.aliyun.com/?p=cas）
        B. 我有备案域名但还没证书 → 我帮你申请阿里云免费 DV 证书（约 5-10 分钟签发）
        C. 我现在还没域名 → 跳过 HTTPS（先用 HTTP 上线，办好域名再回头加 HTTPS）

      注意：选 C 时站点【未加密】，仅适合内测/演示，不建议长期使用。
    output_vars:
      ssl_certificate_id: ""
      ssl_status: ""
    report: |
      ✓ SSL 证书阶段：${ssl_certificate_id ? "已就绪（证书 ID ${ssl_certificate_id}）" : "已跳过（HTTPS 暂未启用）"}

  # ─── Step 3: ALB ───
  - name: "创建分流引导员（ALB 负载均衡）"
    type: api
    product: alb
    action: CreateLoadBalancer
    params:
      RegionId: "${region}"
      LoadBalancerName: "OPC-Pro-Burst-ALB"
      VpcId: "${vpc_id}"
      AddressType: "Internet"
      LoadBalancerBillingConfig.PayType: "PostPay"
      ZoneMappings.1.ZoneId: "${zone_id}"
      ZoneMappings.1.VSwitchId: "${vswitch_id}"
      ZoneMappings.2.ZoneId: "${zone_id_2}"
      ZoneMappings.2.VSwitchId: "${vswitch_id_2}"
    wait_until:
      product: alb
      action: GetLoadBalancerAttribute
      params:
        LoadBalancerId: "${alb_id}"
      condition: "LoadBalancerStatus == Active"
      timeout_seconds: 300
      poll_interval_seconds: 10
    output_vars:
      alb_id: "LoadBalancerId"
    post_actions:
      # The ServerGroup backend-protocol-HTTP tradeoff is the same as pro_steady (VPC intranet transport + app-layer simplicity prioritized)
      - product: alb
        action: CreateServerGroup
        params:
          RegionId: "${region}"
          ServerGroupName: "OPC-Pro-Burst-SG"
          VpcId: "${vpc_id}"
          Protocol: "HTTP"
          HealthCheckConfig.HealthCheckEnabled: true
          HealthCheckConfig.HealthCheckPath: "/"
        output_vars:
          server_group_id: "ServerGroupId"
      - product: alb
        action: AddServersToServerGroup
        params:
          ServerGroupId: "${server_group_id}"
          Servers.1.ServerId: "${ecs_instance_id_1}"
          Servers.1.ServerType: "Ecs"
          Servers.1.Port: 80
          Servers.2.ServerId: "${ecs_instance_id_2}"
          Servers.2.ServerType: "Ecs"
          Servers.2.Port: 80
      # HTTP 80 redirect to HTTPS 443 (only when ssl_certificate_id is ready)
      - product: alb
        action: CreateListener
        when: "${ssl_certificate_id} != ''"
        params:
          LoadBalancerId: "${alb_id}"
          ListenerProtocol: "HTTP"
          ListenerPort: 80
          DefaultActions.1.Type: "Redirect"
          DefaultActions.1.RedirectConfig.Protocol: "HTTPS"
          DefaultActions.1.RedirectConfig.Port: "443"
          DefaultActions.1.RedirectConfig.HttpCode: "HTTP_301"
      # No-cert fallback: HTTP 80 direct-forward
      - product: alb
        action: CreateListener
        when: "${ssl_certificate_id} == ''"
        params:
          LoadBalancerId: "${alb_id}"
          ListenerProtocol: "HTTP"
          ListenerPort: 80
          DefaultActions.1.Type: "ForwardGroup"
          DefaultActions.1.ForwardGroupConfig.ServerGroupTuples.1.ServerGroupId: "${server_group_id}"
      # HTTPS 443 business listener (only when ssl_certificate_id is ready)
      - product: alb
        action: CreateListener
        when: "${ssl_certificate_id} != ''"
        params:
          LoadBalancerId: "${alb_id}"
          ListenerProtocol: "HTTPS"
          ListenerPort: 443
          Certificates.1.CertificateId: "${ssl_certificate_id}"
          DefaultActions.1.Type: "ForwardGroup"
          DefaultActions.1.ForwardGroupConfig.ServerGroupTuples.1.ServerGroupId: "${server_group_id}"
      - product: alb
        action: GetLoadBalancerAttribute
        params:
          LoadBalancerId: "${alb_id}"
        output_vars:
          alb_dns: "DNSName"
    report: |
      ✓ 负载均衡已就位！
        ALB：${alb_dns}
        HTTPS 监听：${ssl_certificate_id ? "端口 443（业务流量；证书 ID ${ssl_certificate_id}）" : "暂未启用（建议尽快办域名+免费证书）"}
        HTTP 监听：${ssl_certificate_id ? "端口 80（强跳 HTTPS）" : "端口 80（直转后端，未加密——临时模式）"}
        HTTPS 443 业务监听 + HTTP 80 强跳 HTTPS（访客全程加密）
        后端：2 台 ECS 已挂载
        🔒 SSL 证书走阿里云数字证书服务（CAS · 免费 DV 版），到期前 30 天自动续——不用管。
        （注意：ALB 监听用的证书来自 CAS，不是 ESA 边缘证书；两者独立。CAS 控制台 yundun.console.aliyun.com/?p=cas）

  # ─── Step 4: ESS auto-scaling ───
  - name: "配置弹性伸缩（突发时自动加第3台）"
    type: api
    product: ess
    action: CreateScalingGroup
    params:
      RegionId: "${region}"
      ScalingGroupName: "OPC-Pro-Burst-ESS"
      # the VPC is implied by VSwitchId; CreateScalingGroup does not accept a --VpcId parameter
      VSwitchId: "${vswitch_id}"
      MinSize: 2
      MaxSize: 3
      # usually 2 instances, up to 3 on burst
      DefaultCooldown: 300
      # 5-minute cooldown, prevents frequent scaling
      LoadBalancerIds: '["${alb_id}"]'
      # ⚠️ ESS associates the ALB ServerGroupId
      # at execution time this may need AttachAlbServerGroups
    output_vars:
      scaling_group_id: "ScalingGroupId"
    post_actions:
      # ESS CreateScalingGroup does not support tagging at creation + auto-launched instances do not inherit the scaling-group tag,
      # so tag it immediately after creation via TagResources, otherwise the Manage/Teardown statements (StringEquals acs:ResourceTag) all ImplicitDeny.
      - product: ess
        action: TagResources
        params:
          RegionId: "${region}"
          ResourceType: "scalinggroup"
          ResourceIds.1: "${scaling_group_id}"
          # ESS TagResources uses singular param names Tag.N.Key/Value (measured on aliyun CLI 3.4.1), not the plural Tags.N
          Tag.1.Key: "opc:managed"
          Tag.1.Value: "true"
          Tag.2.Key: "opc:sku"
          Tag.2.Value: "pro_burst"
      # Create the scaling configuration (defines the spec of newly-launched ECS)
      - product: ess
        action: CreateScalingConfiguration
        params:
          ScalingGroupId: "${scaling_group_id}"
          ScalingConfigurationName: "OPC-Pro-Burst-Config"
          InstanceType: "ecs.c9i.2xlarge"
          ImageId: "${state.resources.ecs.image_id}"
          SecurityGroupId: "${security_group_id}"
          SystemDiskCategory: "cloud_essd"
          SystemDiskSize: 40
          InternetChargeType: "PayByTraffic"
          InternetMaxBandwidthOut: 100
          InstanceName: "OPC-Pro-Burst-ESS-Node"
          # Removed the original Tags: '[{"Key":"opc:managed","Value":"true"},...]' —
          # E2E measured: the Tags param of CreateScalingConfiguration does NOT tag the instances ESS auto-launches,
          # so leaving Tags in is misleading (implying they're tagged). Honest approach: remove the param; launched instances have NO opc:managed tag.
          # Security-equivalence argument:
          #   ① the ScalingGroup itself is tagged via the ess:TagResources post_action (step above); ownership is judged at the ScalingGroup level;
          #   ② the temporary instances ESS launches are fully lifecycle-managed by the ScalingGroup (ess:RemoveInstances goes through DetachInstances),
          #      not entering the DenyUntaggedModify statement's misjudgment scope;
          #   ③ a user SSHing into a launched instance for manual changes is outside RAM policy scope (an app-layer risk), unrelated to tag isolation;
          #   ④ at teardown, DeleteScalingGroup auto-reclaims all launched instances, no need to rely on instance-level tags.
          # If later changed to an ESS Lifecycle Hook + Cloud Assistant post-tag after InService, revisit this note.
          # UserData placeholder: auto-pull the deploy package from OSS and start the app
          # In practice the deploy skill replaces ${app_oss_path} and ${app_start_cmd} in Phase 0.6
          # and base64-encodes it into UserData (CreateScalingConfiguration requires base64)
          # Default script logic: ① ossutil configures RAM Role credentials (ECS instance role, no AK needed)
          #              ② ossutil cp -r oss://${app_oss_path} /opt/app
          #              ③ cd /opt/app && run ${app_start_cmd} (e.g. systemctl start opc-app)
          # When the user skips app deployment (just wants empty ECS for ops) → leave UserData empty
          UserData: "${ess_node_userdata_b64}"
          # This variable is assembled in the deploy skill main flow:
          #   ess_node_userdata_b64 = base64(scripts/ess-node-bootstrap.sh)
          # The script uses strict mode internally (set -euo pipefail) + writes failures to /var/log/opc-bootstrap.err
        # Must capture ScalingConfigurationId for the downstream EnableScalingGroup
        output_vars:
          scaling_config_id: "ScalingConfigurationId"
      # Enable the scaling group
      - product: ess
        action: EnableScalingGroup
        params:
          ScalingGroupId: "${scaling_group_id}"
          ActiveScalingConfigurationId: "${scaling_config_id}"
      # Create the scale-out rule (CPU > 80% → add one)
      - product: ess
        action: CreateScalingRule
        params:
          ScalingGroupId: "${scaling_group_id}"
          ScalingRuleName: "scale-out-cpu80"
          AdjustmentType: "QuantityChangeInCapacity"
          AdjustmentValue: 1
          Cooldown: 300
        output_vars:
          scale_out_rule_ari: "ScalingRuleAri"   # used by the CloudMonitor alarm's AlarmActions
      # Create the scale-in rule (CPU < 30% → remove one)
      - product: ess
        action: CreateScalingRule
        params:
          ScalingGroupId: "${scaling_group_id}"
          ScalingRuleName: "scale-in-cpu30"
          AdjustmentType: "QuantityChangeInCapacity"
          AdjustmentValue: -1
          Cooldown: 300
        output_vars:
          scale_in_rule_ari: "ScalingRuleAri"
      # ─── Use the ESS built-in CreateAlarm API ───
      # CMS PutResourceMetricRule's Webhook field expects an HTTP URL not an ARN; early misuse caused silent failure.
      # ESS CreateAlarm is the correct wiring: AlarmAction.N (RepeatList) takes the ScalingRuleAri.
      # ⚠️ The aliyun CLI RepeatList param format is --AlarmAction.1 "value", not a JSON array.
      - product: ess
        action: CreateAlarm
        params:
          RegionId: "${region}"
          ScalingGroupId: "${scaling_group_id}"
          Name: "opc-pro-burst-cpu-out"
          MetricName: "CpuUtilization"
          MetricType: "system"
          Period: 60
          Statistics: "Average"
          ComparisonOperator: ">="
          Threshold: 80
          EvaluationCount: 5
          AlarmAction.1: "${scale_out_rule_ari}"
        output_vars:
          alarm_task_id_out: "AlarmTaskId"
      - product: ess
        action: CreateAlarm
        params:
          RegionId: "${region}"
          ScalingGroupId: "${scaling_group_id}"
          Name: "opc-pro-burst-cpu-in"
          MetricName: "CpuUtilization"
          MetricType: "system"
          Period: 300
          Statistics: "Average"
          ComparisonOperator: "<="
          Threshold: 30
          EvaluationCount: 3
          AlarmAction.1: "${scale_in_rule_ari}"
        output_vars:
          alarm_task_id_in: "AlarmTaskId"
    report: |
      ✓ 弹性伸缩已配置！
        伸缩组：${scaling_group_id}
        规则：平时 2 台 → CPU>80% 持续 5 分钟加到 3 台 → CPU<30% 持续 15 分钟缩回 2 台
        触发机制：CloudMonitor 报警自动调用伸缩规则
        新机器规格：c9i 8核16G（与常驻机一致）
        费用：ESS + CloudMonitor 基础监控均免费，只付被拉起的 ECS 按量费用（约 ¥1/小时）

  # ─── Step 5: RDS HA ───
  - name: "创建客户档案柜（RDS 高可用版 4核8G）"
    type: api
    product: rds
    action: CreateDBInstance
    params:
      RegionId: "${region}"
      ZoneId: "${zone_id}"
      Engine: "MySQL"
      EngineVersion: "8.0"
      DBInstanceClass: "mysql.n2.large.2c"
      # pro_burst default binding: HA 4C8G general_essd 200G (Beijing measured ¥1262/month)
      DBInstanceStorage: 200
      DBInstanceStorageType: "general_essd"
      DBInstanceNetType: "Intranet"
      VPCId: "${vpc_id}"
      VSwitchId: "${vswitch_id}"
      SecurityIPList: "127.0.0.1/32"
      # lock with 127.0.0.1/32 at creation (no external IP reachable),
      # then clear the allowlist immediately after post_actions sets up security-group authorization, avoiding both IP-allowlist and security-group authorization coexisting
      # the old value "${ecs_private_ip_1}/32,${ecs_private_ip_2}/32" is now meaningless (switched to security-group authorization)
      # removed the original 10.0.0.0/24 range authorization, switched to security-group authorization (see post_actions)
      # ESS-launched ECS automatically gain RDS-connect rights by inheriting the security group, no need to open a whole IP range
      PayType: "Prepaid"
      Period: "Month"
      UsedTime: "1"
      DBInstanceDescription: "OPC-Pro-Burst-RDS-HA"
      Category: "HighAvailability"
    wait_until:
      product: rds
      action: DescribeDBInstanceAttribute
      params:
        DBInstanceId: "${rds_instance_id}"
      condition: "Items.DBInstanceAttribute[0].DBInstanceStatus == Running"
      timeout_seconds: 600
      poll_interval_seconds: 20
    output_vars:
      rds_instance_id: "DBInstanceId"
    post_actions:
      # The RDS AddTagsToResource API requires lowercase Tag.1.key/Tag.1.value
      - product: rds
        action: AddTagsToResource
        params:
          RegionId: "${region}"
          DBInstanceId: "${rds_instance_id}"
          Tag.1.key: "opc:managed"
          Tag.1.value: "true"
      - product: rds
        action: CreateAccount
        params:
          DBInstanceId: "${rds_instance_id}"
          AccountName: "opc_admin"
          AccountPassword: "${generated_password}"
          AccountType: "Normal"  # least privilege
      # Aligned with all RDS yamls — create the database first, then grant
      - product: rds
        action: CreateDatabase
        params:
          DBInstanceId: "${rds_instance_id}"
          DBName: "opc_app"
          CharacterSetName: "utf8mb4"
      # Grant ReadWrite only
      - product: rds
        action: GrantAccountPrivilege
        params:
          DBInstanceId: "${rds_instance_id}"
          AccountName: "opc_admin"
          DBName: "opc_app"
          AccountPrivilege: "ReadWrite"
      # Use security-group authorization instead of the 10.0.0.0/24 IP range (ESS-launched ECS connect to RDS by inheriting the security group)
      - product: rds
        action: ModifySecurityGroupConfiguration
        params:
          DBInstanceId: "${rds_instance_id}"
          SecurityGroupId: "${security_group_id}"
      # After security-group authorization, clear the IP allowlist (remove the 127.0.0.1/32 placeholder) to avoid dual authorization
      - product: rds
        action: ModifySecurityIps
        params:
          DBInstanceId: "${rds_instance_id}"
          SecurityIps: ""    # clear → afterwards only security-group authorization applies
          ModifyMode: "Cover"
      - product: rds
        action: DescribeDBInstanceNetInfo
        params:
          DBInstanceId: "${rds_instance_id}"
        output_vars:
          rds_connection_string: "DBInstanceNetInfos.DBInstanceNetInfo[0].ConnectionString"
          rds_port: "DBInstanceNetInfos.DBInstanceNetInfo[0].Port"
    report: |
      ✓ 高可用数据库已就绪！
        连接地址：${rds_connection_string}:${rds_port}
        用户名：opc_admin（Normal + ReadWrite，密码已单次告知，未保存到任何文件）
        配置：MySQL 8.0 · HA 双节点 · 4核8G · 200GB 数据存储空间
        访问控制：用安全组授权（ESS 弹性扩容出来的服务器自动有连接权，无需开整段 IP）

  # ─── Step 6: OSS 500GB (three-layer protection) ───
  - name: "创建大仓库（OSS 500GB · 三层保护）"
    type: api
    product: oss
    action: PutBucket
    # use `aliyun oss <verb>` (ossutil style; --profile still inherits the RamRoleArn credentials)
    params:
      BucketName: "opc-${random_suffix}"
      RegionId: "${region}"
      StorageClass: "Standard"
      DataRedundancyType: "LRS"
    cli_command: |
      aliyun --profile opc oss mb oss://opc-${random_suffix} --acl private --storage-class Standard --redundancy-type LRS
    output_vars:
      oss_bucket: "opc-${random_suffix}"
      oss_endpoint: "oss-${region}.aliyuncs.com"
    post_actions:
      - product: oss
        action: PutBucketEncryption
        cli_command: |
          aliyun --profile opc oss bucket-encryption --method put oss://${oss_bucket} --sse-algorithm AES256
      - product: oss
        action: PutBucketVersioning
        cli_command: |
          aliyun --profile opc oss bucket-versioning --method put oss://${oss_bucket} enabled
      - product: oss
        action: PutPublicAccessBlock
        # ossutil has no equivalent yet; use access-monitor + the already-set --acl private as the backstop
        cli_command: |
          aliyun --profile opc oss access-monitor --method put oss://${oss_bucket} Enabled
      - product: oss
        action: PutBucketTagging
        cli_command: |
          aliyun --profile opc oss bucket-tagging --method put oss://${oss_bucket} "opc:managed#true" "opc:sku#pro_burst"
    report: "✓ 大仓库已开通（${oss_bucket}，500GB，¥54/月 · 三层保护：加密+版本+阻断公共访问）"

